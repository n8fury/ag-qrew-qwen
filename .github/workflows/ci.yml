name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  orchestrator:
    name: orchestrator · typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: orchestrator/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # The suite runs key-less: setup.ts forces AGQREW_MOCK=1, and the E2E's
      # DOM probe fails fast without browsers — no `playwright install` needed.
      - run: npm test

  dashboard:
    name: dashboard · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build
